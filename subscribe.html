<!DOCTYPE html>
<html><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Subscribe</title>
<style>body{margin:0;background:#111;color:#fff;font-family:Arial,Helvetica,sans-serif;padding:24px;max-width:420px;margin-inline:auto}.card{background:#1a1a1a;border:1px solid #2b2b2b;border-radius:18px;padding:20px}.btn{width:100%;height:48px;border:none;border-radius:14px;margin-top:10px;background:#ff4fa3;color:#fff;font-weight:700;cursor:pointer}.btn.dark{background:#2a2a2a;border:1px solid #3a3a3a}</style>
</head><body><div class="card"><h2 style="margin-top:0">Subscribe</h2><button class="btn dark" onclick="back()">Back</button></div>
<script>function getAccessToken(){return localStorage.getItem('accessToken')||'';} if(!getAccessToken()){localStorage.setItem('loginReturnTo','subscribe.html'); window.location.href='login.html';} function back(){window.location.href='result.html';}</script></body></html>
