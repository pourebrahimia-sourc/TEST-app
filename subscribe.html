<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>AI Club Minimal - Subscribe</title><style>body{margin:0;background:#111;color:#fff;font-family:Arial,sans-serif;padding:24px}.wrap{max-width:420px;margin:0 auto}.card{background:#1a1a1a;border:1px solid #2b2b2b;border-radius:16px;padding:18px}button{padding:12px 14px;border:none;border-radius:12px;background:#ff4fa3;color:#fff;cursor:pointer;font-weight:700;margin-right:8px;margin-top:10px}.dark{background:#2a2a2a;border:1px solid #3a3a3a}</style></head><body><div class="wrap"><div class="card"><h2>Subscribe</h2><div id="status">Checking session...</div><button onclick="backToResult()">Back to Result</button><button class="dark" onclick="logout()">Logout</button></div></div><script>function getAccessToken(){ return localStorage.getItem('accessToken')||''; } function backToResult(){ window.location.href='result.html'; } function logout(){ ['accessToken','refreshToken','userId','userEmail','userName','loginReturnTo'].forEach(k=>localStorage.removeItem(k)); window.location.href='index.html'; } document.getElementById('status').textContent=getAccessToken()?'Logged in':'No token'; if(!getAccessToken()){ localStorage.setItem('loginReturnTo','result.html'); window.location.href='login.html'; }</script></body></html>
