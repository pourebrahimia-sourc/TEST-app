<!DOCTYPE html>
<html><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Reset Password</title>
<style>body{margin:0;background:#111;color:#fff;font-family:Arial,Helvetica,sans-serif;padding:24px;max-width:420px;margin-inline:auto}.card{background:#1a1a1a;border:1px solid #2b2b2b;border-radius:18px;padding:20px}.btn{width:100%;height:48px;border:none;border-radius:14px;margin-top:10px;background:#ff4fa3;color:#fff;font-weight:700;cursor:pointer}input{width:100%;height:48px;border-radius:14px;border:1px solid #2b2b2b;background:#111;color:#fff;padding:0 14px;margin-top:10px;box-sizing:border-box}.status{margin-top:10px;font-size:13px;color:#ff9ac8}</style>
</head><body><div class="card"><h2 style="margin-top:0">Reset Password</h2><input id="password" type="password" placeholder="New Password" /><button class="btn" onclick="resetPassword()">Update Password</button><div class="status" id="status"></div></div>
<script>
function setStatus(t){document.getElementById('status').textContent=t||'';}
async function resetPassword(){
  const params = new URLSearchParams(window.location.hash.substring(1));
  const access_token = params.get('access_token');
  const refresh_token = params.get('refresh_token');
  const password = document.getElementById('password').value.trim();
  if(!access_token || !refresh_token || !password){ setStatus('Missing token or password'); return; }
  const res = await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'update-password',access_token,refresh_token,password})});
  const data = await res.json();
  setStatus(data.error || 'Password updated');
}
</script></body></html>
