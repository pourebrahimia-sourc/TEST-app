<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Club - Login</title>
  <style>
    body{margin:0;background:#111;color:#fff;font-family:Arial,Helvetica,sans-serif;padding:24px;max-width:420px;margin-inline:auto}
    .card{background:#1a1a1a;border:1px solid #2b2b2b;border-radius:18px;padding:20px}
    .row{display:flex;gap:10px;margin-bottom:16px}.row button{flex:1}
    .btn{width:100%;height:48px;border:none;border-radius:14px;margin-top:10px;background:#ff4fa3;color:#fff;font-weight:700;cursor:pointer}
    .btn.dark{background:#2a2a2a;border:1px solid #3a3a3a}
    input{width:100%;height:48px;border-radius:14px;border:1px solid #2b2b2b;background:#111;color:#fff;padding:0 14px;margin-top:10px;box-sizing:border-box}
    .active{outline:2px solid #ff4fa3}
    .status{margin-top:12px;font-size:13px;color:#ff9ac8;min-height:18px}
  </style>
</head>
<body>
<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <strong>Login</strong>
    <button class="btn dark" style="width:auto;height:36px;margin:0;padding:0 12px" onclick="closeLogin()">Close</button>
  </div>
  <div class="row">
    <button id="loginBtn" class="btn active" onclick="setMode('login')">Login</button>
    <button id="signupBtn" class="btn dark" onclick="setMode('signup')">Sign Up</button>
  </div>
  <input id="email" type="email" placeholder="Email" />
  <input id="name" type="text" placeholder="Name" style="display:none" />
  <input id="password" type="password" placeholder="Password" />
  <input id="confirmPassword" type="password" placeholder="Repeat Password" style="display:none" />
  <button class="btn" onclick="submitAuth()" id="mainBtn">Login</button>
  <button class="btn dark" onclick="googleLogin()">Google</button>
  <button class="btn dark" onclick="forgotPassword()" id="forgotBtn">Forgot Password</button>
  <div class="status" id="status"></div>
</div>
<script>
let mode='login';
function setStatus(text){ document.getElementById('status').textContent = text || ''; }
function getSafeReturnTo(){
  const v = localStorage.getItem('loginReturnTo');
  const allowed = ['index.html','result.html','gift.html','subscribe.html'];
  return allowed.includes(v) ? v : 'index.html';
}
function redirectAfterAuth(){
  const returnTo = getSafeReturnTo();
  localStorage.removeItem('loginReturnTo');
  window.location.href = returnTo;
}
function saveAuth(data){
  if(data?.session?.access_token) localStorage.setItem('accessToken', data.session.access_token);
  if(data?.session?.refresh_token) localStorage.setItem('refreshToken', data.session.refresh_token);
  if(data?.user?.id) localStorage.setItem('userId', data.user.id);
  localStorage.setItem('userEmail', data?.user?.email || '');
  localStorage.setItem('userName', data?.user?.user_metadata?.name || 'User');
}
function setMode(next){
  mode = next;
  document.getElementById('name').style.display = next==='signup' ? 'block':'none';
  document.getElementById('confirmPassword').style.display = next==='signup' ? 'block':'none';
  document.getElementById('forgotBtn').style.display = next==='login' ? 'block':'none';
  document.getElementById('mainBtn').textContent = next==='login' ? 'Login' : 'Create Account';
  document.getElementById('loginBtn').className = next==='login' ? 'btn active' : 'btn dark';
  document.getElementById('signupBtn').className = next==='signup' ? 'btn active' : 'btn dark';
  setStatus('');
}
async function submitAuth(){ if(mode==='login') return login(); return signup(); }
async function login(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  if(!email || !password){ setStatus('Enter email and password'); return; }
  setStatus('Logging in...');
  try{
    const res = await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'login',email,password})});
    const data = await res.json();
    if(data.error){ setStatus(data.error); return; }
    saveAuth(data); redirectAfterAuth();
  }catch(e){ setStatus('Login failed'); }
}
async function signup(){
  const email = document.getElementById('email').value.trim();
  const name = document.getElementById('name').value.trim();
  const password = document.getElementById('password').value.trim();
  const confirmPassword = document.getElementById('confirmPassword').value.trim();
  if(!email || !name || !password || !confirmPassword){ setStatus('Fill all fields'); return; }
  if(password !== confirmPassword){ setStatus('Passwords do not match'); return; }
  setStatus('Creating account...');
  try{
    const res = await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'signup',email,password,name})});
    const data = await res.json();
    if(data.error){ setStatus(data.error); return; }
    if(!data.session?.access_token){ setStatus('Account created. Check email then login.'); setMode('login'); return; }
    saveAuth(data); redirectAfterAuth();
  }catch(e){ setStatus('Signup failed'); }
}
async function googleLogin(){
  setStatus('Redirecting to Google...');
  try{
    const res = await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'google'})});
    const data = await res.json();
    if(data.error){ setStatus(data.error); return; }
    window.location.href = data.url;
  }catch(e){ setStatus('Google login failed'); }
}
async function forgotPassword(){
  const email = document.getElementById('email').value.trim();
  if(!email){ setStatus('Enter your email'); return; }
  setStatus('Sending reset email...');
  try{
    const res = await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'forgot',email})});
    const data = await res.json();
    setStatus(data.error || 'Reset email sent');
  }catch(e){ setStatus('Forgot password failed'); }
}
function closeLogin(){
  const returnTo = getSafeReturnTo();
  localStorage.removeItem('loginReturnTo');
  window.location.href = returnTo;
}
setMode('login');
</script>
</body>
</html>
