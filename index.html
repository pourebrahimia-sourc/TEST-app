<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Club Minimal - Index</title>
  <style>
    body{margin:0;background:#111;color:#fff;font-family:Arial,sans-serif;padding:24px}
    .wrap{max-width:420px;margin:0 auto}
    .card{background:#1a1a1a;border:1px solid #2b2b2b;border-radius:16px;padding:18px}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    button{padding:12px 14px;border:none;border-radius:12px;background:#ff4fa3;color:#fff;cursor:pointer;font-weight:700}
    .dark{background:#2a2a2a;border:1px solid #3a3a3a}
    .muted{opacity:.75;font-size:14px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h2>Index</h2>
    <div class="muted">Minimal redirect test</div>
    <div id="status" class="muted" style="margin-top:10px;">Checking session...</div>
    <div class="row">
      <button onclick="goLogin('index.html')">Login</button>
      <button class="dark" onclick="goResult()">Result</button>
      <button class="dark" onclick="goAge()">Age</button>
    </div>
    <div class="row">
      <button class="dark" onclick="goGift()">Gift</button>
      <button class="dark" onclick="goSubscribe()">Subscribe</button>
      <button class="dark" onclick="logout()">Logout</button>
    </div>
  </div>
</div>
<script>
function getAccessToken(){ return localStorage.getItem('accessToken') || ''; }
function authHeaders(extra={}){ const t=getAccessToken(); return t?{...extra,Authorization:'Bearer '+t}:extra; }
function setReturnTo(page){ localStorage.setItem('loginReturnTo', page); }
function goLogin(page){ setReturnTo(page); window.location.href='login.html'; }
function goResult(){ window.location.href='result.html'; }
function goAge(){ localStorage.setItem('funnelFrom','index'); window.location.href='age.html'; }
function goGift(){ if(getAccessToken()){ window.location.href='gift.html'; } else { goLogin('index.html'); } }
function goSubscribe(){ if(getAccessToken()){ window.location.href='subscribe.html'; } else { goLogin('index.html'); } }
function logout(){ ['accessToken','refreshToken','userId','userEmail','userName','loginReturnTo'].forEach(k=>localStorage.removeItem(k)); location.reload(); }
async function check(){
  const s=document.getElementById('status');
  if(!getAccessToken()){ s.textContent='Logged out'; return; }
  try{
    const res=await fetch('/api/session',{headers:authHeaders()});
    const json=await res.json();
    const session=json?.data?.session;
    s.textContent=session?.user?`Logged in as ${session.user.email}`:'Token found but no session';
  }catch(e){ s.textContent='Session check failed'; }
}
check();
</script>
</body>
</html>
