<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Club Minimal - Result</title>
  <style>
    body{margin:0;background:#111;color:#fff;font-family:Arial,sans-serif;padding:24px}.wrap{max-width:420px;margin:0 auto}.card{background:#1a1a1a;border:1px solid #2b2b2b;border-radius:16px;padding:18px}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}button{padding:12px 14px;border:none;border-radius:12px;background:#ff4fa3;color:#fff;cursor:pointer;font-weight:700}.dark{background:#2a2a2a;border:1px solid #3a3a3a}.muted{opacity:.75;font-size:14px}
  </style>
</head>
<body>
<div class="wrap"><div class="card">
  <h2>Result</h2>
  <div id="status" class="muted">Loading...</div>
  <div id="user" class="muted" style="margin-top:8px;"></div>
  <div class="row">
    <button onclick="goAge()">Edit (Age)</button>
    <button class="dark" onclick="goGift()">Gift</button>
    <button class="dark" onclick="goSubscribe()">Subscribe</button>
  </div>
  <div class="row">
    <button class="dark" onclick="goIndex()">Index</button>
    <button class="dark" onclick="goLoginFromResult()">Login</button>
    <button class="dark" onclick="logout()">Logout</button>
  </div>
</div></div>
<script>
function getAccessToken(){ return localStorage.getItem('accessToken') || ''; }
function authHeaders(extra={}){ const t=getAccessToken(); return t?{...extra,Authorization:'Bearer '+t}:extra; }
function saveUserSession(user, accessToken, refreshToken, profileName=''){ if(accessToken) localStorage.setItem('accessToken',accessToken); if(refreshToken) localStorage.setItem('refreshToken',refreshToken); if(user?.id) localStorage.setItem('userId',user.id); localStorage.setItem('userEmail',user?.email||''); localStorage.setItem('userName',profileName || user?.user_metadata?.name || 'User'); }
function clearOauthUrl(){ history.replaceState({}, document.title, window.location.pathname); }
async function syncGoogleSessionFromHash(){
  const hash=window.location.hash||'';
  if(!hash.includes('access_token')) return false;
  const params=new URLSearchParams(hash.substring(1));
  const accessToken=params.get('access_token');
  const refreshToken=params.get('refresh_token');
  if(!accessToken){ clearOauthUrl(); return false; }
  try{
    const res=await fetch('/api/session',{headers:{Authorization:'Bearer '+accessToken}});
    const json=await res.json();
    const session=json?.data?.session;
    const user=session?.user;
    if(user){ saveUserSession(user,accessToken,refreshToken,session?.profileName||''); }
  }catch(e){ console.log('sync failed', e); }
  const returnTo=localStorage.getItem('loginReturnTo');
  clearOauthUrl();
  if(returnTo==='index.html'){
    localStorage.removeItem('loginReturnTo');
    window.location.href='index.html';
    return true;
  }
  return false;
}
async function syncStoredSession(){ if(!getAccessToken()) return null; try{ const res=await fetch('/api/session',{headers:authHeaders()}); const json=await res.json(); return json?.data?.session || null; } catch(e){ return null; } }
function goLoginFromResult(){ localStorage.setItem('loginReturnTo','result.html'); window.location.href='login.html'; }
function goAge(){ localStorage.setItem('funnelFrom','result'); window.location.href='age.html'; }
function goGift(){ if(getAccessToken()) window.location.href='gift.html'; else goLoginFromResult(); }
function goSubscribe(){ if(getAccessToken()) window.location.href='subscribe.html'; else goLoginFromResult(); }
function goIndex(){ window.location.href='index.html'; }
function logout(){ ['accessToken','refreshToken','userId','userEmail','userName','loginReturnTo'].forEach(k=>localStorage.removeItem(k)); location.reload(); }
async function init(){
  const redirected=await syncGoogleSessionFromHash();
  if(redirected) return;
  const status=document.getElementById('status');
  const userEl=document.getElementById('user');
  const session=await syncStoredSession();
  if(session?.user){ status.textContent='Logged in'; userEl.textContent=(session.profileName || session.user.user_metadata?.name || 'User')+' • '+(session.user.email||''); }
  else { status.textContent='Logged out'; userEl.textContent=''; }
}
document.addEventListener('DOMContentLoaded', init);
window.addEventListener('pageshow', init);
</script>
</body>
</html>
