<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Club - Result</title>
  <style>
    body{margin:0;background:#111;color:#fff;font-family:Arial,Helvetica,sans-serif;padding:24px;max-width:420px;margin-inline:auto}
    .card{background:#1a1a1a;border:1px solid #2b2b2b;border-radius:18px;padding:20px}
    .btn{width:100%;height:48px;border:none;border-radius:14px;margin-top:10px;background:#ff4fa3;color:#fff;font-weight:700;cursor:pointer}
    .btn.dark{background:#2a2a2a;border:1px solid #3a3a3a}
    .muted{opacity:.75;font-size:13px}
  </style>
</head>
<body>
<div class="card">
  <h2 style="margin-top:0">Result</h2>
  <div id="status" class="muted">Checking session...</div>
  <div id="details" class="muted" style="margin-top:8px"></div>
  <button class="btn" onclick="goLoginFromResult()">Login</button>
  <button class="btn dark" onclick="goEdit()">Edit Character</button>
  <button class="btn dark" onclick="goGift()">Gift</button>
  <button class="btn dark" onclick="goSubscribe()">Subscribe</button>
  <button class="btn dark" onclick="logout()">Logout</button>
</div>
<script>
function getAccessToken(){ return localStorage.getItem('accessToken') || ''; }
function authHeaders(extra={}){ const t=getAccessToken(); return t ? {...extra, Authorization:'Bearer '+t} : extra; }
function clearOauthUrl(){ history.replaceState({}, document.title, window.location.pathname); }
function saveUserSession(user, accessToken, refreshToken, profileName=''){
  if(accessToken) localStorage.setItem('accessToken', accessToken);
  if(refreshToken) localStorage.setItem('refreshToken', refreshToken);
  if(user?.id) localStorage.setItem('userId', user.id);
  localStorage.setItem('userEmail', user?.email || '');
  localStorage.setItem('userName', profileName || user?.user_metadata?.name || 'User');
}
async function syncSessionFromUrl(){
  const hash = window.location.hash || '';
  if(!hash.includes('access_token')) return false;
  const params = new URLSearchParams(hash.substring(1));
  const accessToken = params.get('access_token');
  const refreshToken = params.get('refresh_token');
  if(!accessToken){ clearOauthUrl(); return false; }
  try{
    const res = await fetch('/api/session',{headers:{Authorization:'Bearer '+accessToken}});
    const json = await res.json();
    const session = json?.data?.session;
    const user = session?.user;
    if(user){ saveUserSession(user, accessToken, refreshToken, session?.profileName || ''); }
  }catch(e){}
  const returnTo = localStorage.getItem('loginReturnTo');
  clearOauthUrl();
  if(returnTo === 'index.html' || returnTo === 'gift.html' || returnTo === 'subscribe.html'){
    localStorage.removeItem('loginReturnTo');
    window.location.href = returnTo;
    return true;
  }
  if(returnTo === 'result.html') localStorage.removeItem('loginReturnTo');
  return false;
}
async function refreshSessionUI(){
  const status = document.getElementById('status');
  const details = document.getElementById('details');
  if(!getAccessToken()){ status.textContent='Logged out'; details.textContent=''; return; }
  try{
    const res = await fetch('/api/session',{headers:authHeaders()});
    const json = await res.json();
    const session = json?.data?.session;
    if(session?.user){
      status.textContent = 'Logged in';
      details.textContent = (session.profileName || session.user.email || 'User') + ' • balance: ' + (session.balance ?? 0);
    } else { status.textContent='Logged out'; details.textContent=''; }
  }catch(e){ status.textContent='Logged out'; details.textContent=''; }
}
function goLoginFromResult(){ localStorage.setItem('loginReturnTo','result.html'); window.location.href='login.html'; }
function goEdit(){ localStorage.setItem('funnelFrom','result'); window.location.href='age.html'; }
function goGift(){ if(!getAccessToken()){ localStorage.setItem('loginReturnTo','gift.html'); window.location.href='login.html'; return; } window.location.href='gift.html'; }
function goSubscribe(){ if(!getAccessToken()){ localStorage.setItem('loginReturnTo','subscribe.html'); window.location.href='login.html'; return; } window.location.href='subscribe.html'; }
function logout(){ ['accessToken','refreshToken','userId','userEmail','userName','loginReturnTo'].forEach(k=>localStorage.removeItem(k)); window.location.href='index.html'; }
document.addEventListener('DOMContentLoaded', async ()=>{ const moved = await syncSessionFromUrl(); if(moved) return; await refreshSessionUI(); });
window.addEventListener('pageshow', refreshSessionUI);
</script>
</body>
</html>
